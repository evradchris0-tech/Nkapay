<h2>Changer le mot de passe</h2>
<p class="subtitle">Veuillez définir un nouveau mot de passe</p>

<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="currentPassword">Mot de passe actuel</label>
    <div class="input-wrapper">
      <span class="material-icons">lock_outline</span>
      <input 
        [type]="showCurrentPassword() ? 'text' : 'password'" 
        id="currentPassword" 
        formControlName="currentPassword" 
        placeholder="Mot de passe actuel"
        [class.invalid]="f['currentPassword'].invalid && f['currentPassword'].touched"
      />
      <button type="button" class="toggle-password" (click)="toggleShowCurrent()">
        <span class="material-icons">{{ showCurrentPassword() ? 'visibility_off' : 'visibility' }}</span>
      </button>
    </div>
    <ng-container *ngIf="f['currentPassword'].invalid && f['currentPassword'].touched">
      <span class="error-message">Le mot de passe actuel est requis</span>
    </ng-container>
  </div>

  <div class="form-group">
    <label for="newPassword">Nouveau mot de passe</label>
    <div class="input-wrapper">
      <span class="material-icons">lock</span>
      <input 
        [type]="showNewPassword() ? 'text' : 'password'" 
        id="newPassword" 
        formControlName="newPassword" 
        placeholder="Nouveau mot de passe"
        [class.invalid]="f['newPassword'].invalid && f['newPassword'].touched"
      />
      <button type="button" class="toggle-password" (click)="toggleShowNew()">
        <span class="material-icons">{{ showNewPassword() ? 'visibility_off' : 'visibility' }}</span>
      </button>
    </div>
    <ng-container *ngIf="f['newPassword'].invalid && f['newPassword'].touched">
      <span class="error-message">
        <ng-container *ngIf="f['newPassword'].errors?.['required']">Le nouveau mot de passe est requis</ng-container>
        <ng-container *ngIf="f['newPassword'].errors?.['minlength']">Au moins 6 caractères</ng-container>
      </span>
    </ng-container>
  </div>

  <div class="form-group">
    <label for="confirmPassword">Confirmer le mot de passe</label>
    <div class="input-wrapper">
      <span class="material-icons">lock_reset</span>
      <input 
        [type]="showConfirmPassword() ? 'text' : 'password'" 
        id="confirmPassword" 
        formControlName="confirmPassword" 
        placeholder="Confirmer le mot de passe"
        [class.invalid]="f['confirmPassword'].invalid && f['confirmPassword'].touched"
      />
      <button type="button" class="toggle-password" (click)="toggleShowConfirm()">
        <span class="material-icons">{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</span>
      </button>
    </div>
    <ng-container *ngIf="f['confirmPassword'].invalid && f['confirmPassword'].touched">
      <span class="error-message">
        <ng-container *ngIf="f['confirmPassword'].errors?.['required']">La confirmation est requise</ng-container>
        <ng-container *ngIf="f['confirmPassword'].errors?.['mismatch']">Les mots de passe ne correspondent pas</ng-container>
      </span>
    </ng-container>
  </div>

  <button type="submit" class="btn-submit" [disabled]="isLoading()">
    <ng-container *ngIf="isLoading(); else confirmLabel">
      <span class="spinner"></span>
      Modification en cours...
    </ng-container>
    <ng-template #confirmLabel>
      <span class="material-icons">check</span>
      Confirmer
    </ng-template>
  </button>
</form>
